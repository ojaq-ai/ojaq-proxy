<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ojaq</title>
<!-- PWA -->
<link rel="manifest" href="/playground/manifest.json">
<meta name="theme-color" content="#08080c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ojaq">
<link rel="apple-touch-icon" href="/playground/icons/192.png">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">
</head>
<body>

<!-- ── framework tabs ── -->
<nav id="tabs"></nav>

<!-- ── main area ── -->
<main>
  <!-- ── avatar (full area) ── -->
  <div id="avatar-panel">
    <div id="avatar-wrap"><canvas id="avatar-canvas"></canvas></div>

    <!-- floating UI over avatar -->
    <div id="overlay">
      <div id="status-line">
        <span id="signal"></span>
      </div>
    </div>
  </div>

  <!-- ── sidebar ── -->
  <aside id="sidebar" style="display:none">
    <div id="transcripts">
      <div class="t-block">
        <div class="t-label">you</div>
        <div id="t-user" class="t-text"></div>
      </div>
      <div class="t-block">
        <div class="t-label">ojaq</div>
        <div id="t-model" class="t-text"></div>
      </div>
    </div>

    <!-- presence bars hidden for launch — orbs are the sole visualization
    <div id="presence-bars">
      <div class="bar" data-dim="energy"><span class="bar-label">energy</span><div class="bar-track"><div class="bar-fill"></div></div></div>
      <div class="bar" data-dim="confidence"><span class="bar-label">confidence</span><div class="bar-track"><div class="bar-fill"></div></div></div>
      <div class="bar" data-dim="resistance"><span class="bar-label">resistance</span><div class="bar-track"><div class="bar-fill"></div></div></div>
      <div class="bar" data-dim="engagement"><span class="bar-label">engagement</span><div class="bar-track"><div class="bar-fill"></div></div></div>
      <div class="bar" data-dim="congruence"><span class="bar-label">congruence</span><div class="bar-track"><div class="bar-fill"></div></div></div>
    </div>
    -->

    <div id="timer">00:00</div>
  </aside>
</main>

<!-- ── controls ── -->
<footer id="controls" style="display:none">
  <button id="btn"><span id="btn-icon">&#9654;</span> <span id="btn-text">Start Session</span></button>
  <p id="trust">We don't keep what you said. <a href="/privacy">How it works</a></p>
  <div id="quick-cmds">
    <button data-cmd="[CMD:focus:career]">Career</button>
    <button data-cmd="[CMD:focus:relationships]">Relationships</button>
    <button data-cmd="[CMD:focus:health]">Health</button>
    <button data-cmd="[CMD:focus:growth]">Growth</button>
    <button data-cmd="[CMD:focus:creativity]">Creativity</button>
    <button data-cmd="[CMD:focus:fear]">Fear</button>
    <button data-cmd="[CMD:focus:purpose]">Purpose</button>
  </div>
</footer>

<!-- ── post-session reflection (hidden until session ends) ── -->
<div id="reflection" style="display:none">
  <div id="reflect-inner">
    <div id="reflect-duration"></div>
    <div id="reflect-signal"></div>
    <div id="reflect-waitlist">
      <p class="reflect-cta">Want to continue this?</p>
      <p class="reflect-sub">The mobile app is where Ojaq goes deeper. I'll email you when it's ready.</p>
      <div class="reflect-input-row">
        <input type="email" id="reflect-email" placeholder="your@email.com">
        <button type="button" id="reflect-email-submit" class="reflect-submit">Join</button>
      </div>
      <p id="reflect-wl-note"></p>
    </div>
    <div id="reflect-feedback">
      <p class="reflect-cta">Anything you want me to know?</p>
      <p class="reflect-sub">Optional.</p>
      <div class="reflect-input-row">
        <input type="text" id="reflect-fb" placeholder="What sticks with you?">
        <button type="button" id="reflect-fb-submit" class="reflect-submit">Send</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
